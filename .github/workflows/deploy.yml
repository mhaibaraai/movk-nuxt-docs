name: Deploy Docs

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository }}/docs

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Restore Nuxt build cache
        uses: actions/cache@v5
        with:
          path: |
            docs/.nuxt
            layer/.nuxt
            node_modules/.cache
          key: nuxt-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('docs/content/**') }}
          restore-keys: |
            nuxt-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nuxt-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        env:
          NODE_OPTIONS: --max-old-space-size=10240
          NUXT_GITHUB_TOKEN: ${{ secrets.NUXT_GITHUB_TOKEN }}
          ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
        run: pnpm build

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t "$IMAGE:latest" -t "$IMAGE:$GITHUB_SHA" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$GITHUB_SHA"
